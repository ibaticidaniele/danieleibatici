<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
{% seo %}
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,600;12..96,700;12..96,800&family=Hanken+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --white:#fff;--paper:#eaf3ff;--paper-2:#f6faff;--azzurro:#1683fb;--azzurro-deep:#0b5cd6;
    --azzurro-ink:#06367e;--sky:#bfe0ff;--ink:#091a36;--muted:#566586;--line:#d7e6fb;
    --shadow:0 24px 60px -22px rgba(11,92,214,.35);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html{scroll-behavior:smooth}
  body{font-family:'Hanken Grotesk',system-ui,sans-serif;color:var(--ink);background:var(--white);line-height:1.7;-webkit-font-smoothing:antialiased}
  a{color:var(--azzurro-deep)}
  .wrap{max-width:760px;margin:0 auto;padding:0 24px}
  /* header */
  header{border-bottom:1px solid var(--line);background:var(--paper-2);position:sticky;top:0;z-index:10}
  header .nav{display:flex;align-items:center;justify-content:space-between;padding:16px 24px}
  .logo{font-family:'Bricolage Grotesque';font-weight:800;font-size:1.22rem;letter-spacing:-.03em;display:flex;align-items:center;gap:9px;color:var(--ink);text-decoration:none}
  .logo .dot{width:12px;height:12px;border-radius:4px;background:var(--azzurro);transform:rotate(45deg)}
  .back{font-weight:600;font-size:.92rem;text-decoration:none}
  /* content */
  main{padding:54px 0 70px}
  .post h1{font-family:'Bricolage Grotesque';font-size:clamp(2rem,5vw,2.8rem);line-height:1.06;letter-spacing:-.02em;margin:6px 0 26px}
  .post h2{font-family:'Bricolage Grotesque';font-size:1.4rem;letter-spacing:-.01em;margin:38px 0 12px}
  .post p{margin-bottom:18px;font-size:1.07rem}
  .post ul,.post ol{margin:0 0 18px 22px}
  .post li{margin-bottom:8px}
  .post strong{color:var(--ink)}
  .post .meta{color:var(--muted);font-size:.9rem;font-weight:600;text-transform:uppercase;letter-spacing:.06em}
  .post .lead{font-size:1.18rem;color:var(--muted);margin-bottom:30px}
  .post blockquote{border-left:3px solid var(--azzurro);background:var(--paper-2);padding:14px 18px;border-radius:0 12px 12px 0;color:var(--azzurro-ink);margin:0 0 18px}
  /* post list */
  .post-list{list-style:none;margin:14px 0 0}
  .post-list li{border-top:1px solid var(--line);padding:24px 0;margin:0}
  .post-list .meta{display:block;margin-bottom:6px}
  .post-link{font-family:'Bricolage Grotesque';font-weight:700;font-size:1.3rem;letter-spacing:-.01em;text-decoration:none;color:var(--ink)}
  .post-link:hover{color:var(--azzurro-deep)}
  .post-list p{color:var(--muted);margin-top:6px}
  /* cta */
  .cta{margin-top:46px;background:linear-gradient(160deg,var(--azzurro),var(--azzurro-deep));color:#fff;border-radius:22px;padding:34px;box-shadow:var(--shadow)}
  .cta strong{font-family:'Bricolage Grotesque';font-size:1.35rem;display:block;margin-bottom:8px}
  .cta p{color:rgba(255,255,255,.9);margin-bottom:18px}
  .cta .btn{display:inline-block;background:#fff;color:var(--azzurro-deep);font-weight:700;padding:13px 26px;border-radius:100px;text-decoration:none;transition:.2s}
  .cta .btn:hover{transform:translateY(-2px)}
  /* footer */
  footer{border-top:1px solid var(--line);padding:26px 0;color:var(--muted);font-size:.88rem}
  footer .foot{display:flex;justify-content:space-between;flex-wrap:wrap;gap:10px}
</style>
</head>
<body>
<header>
  <div class="nav">
    <a href="/" class="logo"><span class="dot"></span>Daniele Ibatici</a>
    <a href="/" class="back">← Torna al sito</a>
  </div>
</header>
<main>
  <div class="wrap">
    {{ content }}
  </div>
</main>
<footer>
  <div class="wrap foot">
    <span>© {{ 'now' | date: "%Y" }} Daniele Ibatici — P.IVA 02952060354</span>
    <span><a href="/privacy.html">Privacy &amp; Cookie Policy</a></span>
  </div>
</footer>
</body>
</html>
